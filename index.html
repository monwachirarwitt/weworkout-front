<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weworkout-front</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#e6f6ff",
              "primary": "#006b5e",
              "primary-container": "#00a693",
              "secondary": "#ac3509",
              "background": "#f3faff",
              "on-background": "#071e27",
              "on-surface-variant": "#3c4946",
              "outline": "#6c7a76",
              "outline-variant": "#bbcac5",
            },
            fontFamily: {
              "headline": ["Lexend", "sans-serif"],
              "body": ["Manrope", "sans-serif"],
            }
          }
        }
      }
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .btn-gradient { background: linear-gradient(to right, #ac3509, #fe6f42); }
      .ambient-shadow { box-shadow: 0 20px 40px rgba(7, 30, 39, 0.06); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
